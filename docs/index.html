<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Always show scrollbar</title>
    <meta name="description" content="Privacy policy and extension information for Always show scrollbar.">
    <style>
      :root {
        color-scheme: light dark;
        --background: #f6f8fb;
        --surface: #ffffff;
        --text: #111827;
        --muted: #667085;
        --border: #d0d5dd;
        --primary: #2563eb;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: #111317;
          --surface: #1d2026;
          --text: #f9fafb;
          --muted: #a4a7ae;
          --border: #353a45;
          --primary: #60a5fa;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--background);
        color: var(--text);
        font: 16px/1.6 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(760px, 100%);
        margin: 0 auto;
        padding: 56px 24px;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 28px;
        background: var(--surface);
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 32px;
        line-height: 1.2;
      }

      p {
        margin-top: 12px;
        color: var(--muted);
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        margin-top: 24px;
        border-radius: 7px;
        padding: 9px 14px;
        background: var(--primary);
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid color-mix(in srgb, var(--primary) 45%, transparent);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel" aria-labelledby="title">
        <h1 id="title">Always show scrollbar</h1>
        <p>Privacy policy, extension permission details, and open-source licensing information for the Chrome Web Store listing.</p>
        <p>Always show scrollbar is fully open source under the MIT License.</p>
        <a href="privacy-policy.html">Open privacy policy</a>
      </section>
    </main>
  </body>
</html>
